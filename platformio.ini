[env:test_rtu_client_loopback_lpuart]
; ESP32-C6 needs the pioarduino platform fork (mainline PlatformIO espressif32 has no C6 support)
platform = espressif32
board = seeed_xiao_esp32c6
framework = arduino
test_framework = unity
lib_deps =
    ./
build_flags =
    ; -D EZMODBUS_DEBUG
    ; -fstack-usage
    ; ESP32C6 specific pinout - Uses LPUART for Server side
    -D MBT_UART_NUM=LP_UART_NUM_0
    -D UART_BAUD_RATE=115200
    -D EZM_RX=21
    -D EZM_TX=22
    -D MBT_RX=5
    -D MBT_TX=4
    -D MBT_DE=3
test_filter = test_rtu_client_loopback
build_src_filter =
    +<*>
    +<../test/test_rtu_client_loopback/*>

