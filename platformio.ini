; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; One environment per target board, each running ALL Unity loopback suites:
;   pio test -e s3       -> every suite on the Seeed XIAO ESP32-S3
;   pio test -e c6       -> every suite on the ESP32-C6 (server & peer wiring below)
;   pio test -e native   -> the codec suite on the host
; Board defaults live in the single board env; the test sources read them via build flags.

; ===================================================================================
; SHARED BASES (factored config, not runnable environments)
; ===================================================================================

; Applied to every [env:*]
[env]
test_framework = unity

; Common config for the ESP32 Arduino HW loopback suites. The library (this repo) is
; pulled in once via lib_deps; test_build_src stays off so src/ is not compiled a second
; time as project source (that would double-define every symbol at link).
[esp32]
platform = espressif32@55.3.39 ; https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
                               ; IDF 5.5.4 / Arduino 3.3.9
framework = arduino
lib_deps =
    symlink://.
test_build_src = no
test_ignore = test_codec       ; native-only suite, see [env:native]
build_flags =
    ; -D EZMODBUS_DEBUG

; ===================================================================================
; BOARD ENVIRONMENTS
; ===================================================================================

; Seeed XIAO ESP32-S3: two HP UARTs cross-wired (source defaults target this board).
[env:s3]
extends = esp32
board = seeed_xiao_esp32s3

; ESP32-C6: EZModbus side on HP UART1 (Serial1, 21/22), peer/agent side on the LP-UART
; (4/5, soft DE on 3). Same two ports cross-wired for every suite -> one set of jumpers.
[env:c6]
extends = esp32
board = esp32-c6-devkitm-1
build_flags =
    ${esp32.build_flags}
    ; Console on USB CDC so both HP UARTs stay free for the bus
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -D UART_BAUD_RATE=115200
    ; -D EZMODBUS_HAL_UART_LP_SCLK=LP_UART_SCLK_XTAL_D2
    ; HP UART1 side (has a HardwareSerial)
    -D EZM_SERIAL=Serial1
    -D EZM_UART_NUM=UART_NUM_1
    -D EZM_RX=21
    -D EZM_TX=22
    ; LP-UART side (IDF port only)
    -D MBT_UART_NUM=LP_UART_NUM_0
    -D MBT_RX=4
    -D MBT_TX=5
    -D MBT_DE=3

; Host build of the codec suite (no hardware).
[env:native]
platform = native
build_flags =
    -std=gnu++17
    -D NATIVE_TEST
    ; -D EZMODBUS_DEBUG
    -include test/test_codec/mock/ModbusDebug.h
    -I src
test_filter = test_codec
build_src_filter =
    +<*>
    +<../test/test_codec/*>
